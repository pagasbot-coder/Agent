# PostHog OSS — hobby stack (ADR-002, optional Phase 4)
# Deploy on EU VPS only; do NOT commit secrets. See docs/posthog-self-host.md
#
# Upstream: https://github.com/PostHog/posthog — prefer official hobby script for prod:
#   /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/posthog/posthog/HEAD/bin/deploy-hobby)"
#
# This compose is a minimal reference for local/staging experiments (~4 GB RAM).

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: posthog
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-posthog_local_only}
      POSTGRES_DB: posthog
    volumes:
      - posthog_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U posthog"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  posthog:
    image: posthog/posthog:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      clickhouse:
        condition: service_started
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://posthog:${POSTGRES_PASSWORD:-posthog_local_only}@db:5432/posthog
      REDIS_URL: redis://redis:6379/
      SECRET_KEY: ${POSTHOG_SECRET_KEY:-change-me-before-any-exposure}
      SITE_URL: ${POSTHOG_SITE_URL:-http://localhost:8000}
      DISABLE_SECURE_SSL_REDIRECT: "true"
      IS_BEHIND_PROXY: "false"
    # Full production stack needs worker, plugins, object storage — use official hobby deploy on VPS.

volumes:
  posthog_db:
